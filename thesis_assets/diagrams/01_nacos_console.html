<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Nacos 服务列表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
.container{padding:20px;max-width:900px;width:100%}
.title{text-align:center;font-size:18px;font-weight:bold;margin-bottom:20px;color:#333}
.header{background:#1e90ff;color:#fff;padding:12px 20px;border-radius:6px 6px 0 0;font-size:16px}
.table-wrap{background:#fff;border:1px solid #e8e8e8;border-radius:0 0 6px 6px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:10px 16px;text-align:left;font-size:14px;color:#666;border-bottom:1px solid #e8e8e8}
td{padding:10px 16px;font-size:14px;color:#333;border-bottom:1px solid #f0f0f0}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px}
.badge-up{background:#e6fffb;color:#13c2c2;border:1px solid #87e8de}
.badge-healthy{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.count{color:#1e90ff;font-weight:bold}
</style></head><body>
<div class="container">
<div class="title">图1 Nacos 控制台服务列表</div>
<div class="header">服务列表</div>
<div class="table-wrap">
<table>
<tr><th>服务名</th><th>分组</th><th>实例数</th><th>健康实例数</th><th>状态</th></tr>
<tr><td>service-a</td><td>DEFAULT_GROUP</td><td class="count">1</td><td class="count">1</td><td><span class="badge badge-healthy">健康</span></td></tr>
<tr><td>service-b</td><td>DEFAULT_GROUP</td><td class="count">1</td><td class="count">1</td><td><span class="badge badge-healthy">健康</span></td></tr>
<tr><td>auth-service</td><td>DEFAULT_GROUP</td><td class="count">1</td><td class="count">1</td><td><span class="badge badge-healthy">健康</span></td></tr>
<tr><td>gateway</td><td>DEFAULT_GROUP</td><td class="count">1</td><td class="count">1</td><td><span class="badge badge-up">UP</span></td></tr>
</table>
</div>
</div></body></html>
