<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sentinel Dashboard 流控规则</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f5;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
.container{padding:20px;max-width:950px;width:100%}
.title{text-align:center;font-size:18px;font-weight:bold;margin-bottom:20px;color:#333}
.panel{background:#fff;border:1px solid #d9d9d9;border-radius:4px;margin-bottom:18px;overflow:hidden}
.panel-title{background:#fafafa;padding:10px 16px;font-size:14px;font-weight:bold;color:#333;border-bottom:1px solid #d9d9d9}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:8px 12px;text-align:left;font-size:13px;color:#666;border-bottom:1px solid #e8e8e8}
td{padding:8px 12px;font-size:13px;color:#333;border-bottom:1px solid #f0f0f0}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold}
.badge-qps{background:#e6f7ff;color:#1890ff}
.badge-degrade{background:#fff7e6;color:#fa8c16}
.badge-gateway{background:#f6ffed;color:#52c41a}
</style></head><body>
<div class="container">
<div class="title">图6 Sentinel Dashboard 流控规则配置</div>
<div class="panel">
<div class="panel-title">流控规则 — service-b /inner/identity</div>
<table>
<tr><th>资源名</th><th>阈值类型</th><th>阈值</th><th>流控模式</th><th>统计间隔</th></tr>
<tr><td>/inner/identity</td><td><span class="badge badge-qps">QPS</span></td><td>2</td><td>直接</td><td>1000ms</td></tr>
</table>
</div>
<div class="panel">
<div class="panel-title">熔断规则 — service-b /inner/identity</div>
<table>
<tr><th>资源名</th><th>策略</th><th>最大RT</th><th>比例阈值</th><th>熔断时长</th><th>最小请求数</th></tr>
<tr><td>/inner/identity</td><td><span class="badge badge-degrade">慢调用比例</span></td><td>1000ms</td><td>0.5</td><td>10s</td><td>5</td></tr>
</table>
</div>
<div class="panel">
<div class="panel-title">网关流控规则 — service-b-route</div>
<table>
<tr><th>路由</th><th>类型</th><th>阈值</th><th>间隔</th></tr>
<tr><td>service-b-route</td><td><span class="badge badge-gateway">QPS</span></td><td>3</td><td>1000ms</td></tr>
</table>
</div>
</div></body></html>
